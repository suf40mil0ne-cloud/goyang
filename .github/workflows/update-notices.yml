name: Update Notices

on:
  schedule:
    - cron: '15 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-notices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate notice data
        run: node scripts/prepare-national-data.mjs

      - name: Commit updated data
        run: |
          if git diff --quiet -- data/notices.json data/regions.json data/sido.json data/sigungu.json; then
            echo "No data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/notices.json data/regions.json data/sido.json data/sigungu.json
          git commit -m "chore: refresh notice data"
          git push
